<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#0d0a08"/>
  <!-- Outer tyre -->
  <circle cx="16" cy="16" r="13" stroke="#dc2626" stroke-width="3.5" fill="none"/>
  <!-- Tread dashes -->
  <circle cx="16" cy="16" r="9.5" stroke="#7f1d1d" stroke-width="1.5" fill="none" stroke-dasharray="3 3"/>
  <!-- Rim background -->
  <circle cx="16" cy="16" r="6.5" fill="#1b1512" stroke="#3a322c" stroke-width="1.2"/>
  <!-- 5 spokes -->
  <line x1="16" y1="16" x2="16" y2="10.5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="21.2" y2="13.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="19.1" y2="21.5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="12.9" y2="21.5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="10.8" y2="13.2" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="16" cy="16" r="2" fill="#dc2626"/>
</svg>
